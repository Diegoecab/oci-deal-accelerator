# OCI Architecture Diagram Spec — E-Commerce Platform
# Feed this to: python scripts/oci_diagram_gen.py --spec examples/diagram-spec.yaml
#
# This spec matches the sample-architecture.yaml and produces a .drawio file
# with Oracle's official visual hierarchy and color palette.

title: "Acme Retail — E-Commerce Platform on OCI\nHA/DR Architecture"

tenancy:
  label: "Oracle Cloud Infrastructure"
  w: 1870
  h: 730

  regions:
    # ---- Primary Region ----
    - id: region1
      label: "US East (Ashburn)"
      primary: true
      w: 1140
      h: 680

      vcns:
        - id: vcn1
          label: "prod-vcn 10.0.0.0/16"
          w: 1110
          h: 600

          subnets:
            # Public subnet — Load Balancer, Bastion, WAF
            - id: sub-pub
              label: "Public Subnet\n10.0.1.0/24"
              w: 250
              h: 400
              services:
                - id: lb
                  label: "Flexible\nLoad Balancer\n400 Mbps"
                  type: load_balancer
                  w: 200
                  h: 65
                - id: bastion
                  label: "Bastion\nService"
                  type: bastion
                  w: 100
                  h: 45
                - id: waf-svc
                  label: "Web Application\nFirewall (WAF)"
                  type: waf
                  w: 130
                  h: 45
                - id: apigw
                  label: "API Gateway"
                  type: apigw
                  w: 130
                  h: 40

            # App tier — OKE, Functions, Streaming
            - id: sub-app
              label: "Private Subnet — App Tier\n10.0.10.0/24"
              w: 330
              h: 400
              services:
                - id: oke
                  label: "OKE Cluster\nKubernetes v1.28\n3x VM.Standard.E4.Flex\n4 OCPU / 64 GB"
                  type: oke
                  w: 280
                  h: 75
                  fontSize: 9
                - id: fn
                  label: "OCI Functions\n(Serverless)"
                  type: functions
                  w: 140
                  h: 45
                - id: stream
                  label: "OCI Streaming\n(Kafka API)"
                  type: streaming
                  w: 140
                  h: 45
                - id: queue
                  label: "OCI Queue"
                  type: queue
                  w: 140
                  h: 35

            # Data tier — ADB, NoSQL, Cache, Security
            - id: sub-db
              label: "Private Subnet — Data Tier\n10.0.20.0/24"
              w: 430
              h: 400
              services:
                - id: adb1
                  label: "Autonomous Database\nServerless (ADB-S) OLTP\n4 OCPU (auto-scale) / 2 TB\nBYOL — Private Endpoint"
                  type: adb
                  w: 380
                  h: 80
                  fontSize: 9
                - id: adb-dw
                  label: "ADB-S Data Warehouse\n4 OCPU / 1 TB"
                  type: adw
                  w: 380
                  h: 50
                - id: nosql-svc
                  label: "OCI NoSQL\nOn-Demand"
                  type: nosql
                  w: 180
                  h: 40
                - id: cache-svc
                  label: "OCI Cache\nwith Redis"
                  type: cache
                  w: 180
                  h: 40
                - id: ds
                  label: "Data Safe — Audit, Masking, VPD"
                  type: data_safe
                  w: 380
                  h: 28
                - id: vault-svc
                  label: "OCI Vault — Customer-Managed Keys"
                  type: vault
                  w: 380
                  h: 28

          gateways:
            - {id: igw, label: "Internet\nGateway", type: igw, w: 90}
            - {id: natgw, label: "NAT\nGateway", type: natgw, w: 90}
            - {id: sgw, label: "Service\nGateway", type: sgw, w: 90}
            - {id: drg1, label: "Dynamic Routing\nGateway (DRG)", type: drg, w: 130}
            - {id: nfw, label: "Network\nFirewall", type: network_firewall, w: 100}

      observability:
        - Monitoring
        - Logging Analytics
        - APM
        - DB Management
        - Ops Insights
        - Notifications
        - Events

    # ---- DR Region ----
    - id: region2
      label: "US West (Phoenix) — DR"
      primary: false
      x: 1195
      w: 640
      h: 480

      vcns:
        - id: vcn-dr
          label: "dr-vcn 10.1.0.0/16"
          w: 610
          h: 400

          subnets:
            - id: sub-dr-db
              label: "Private Subnet — DR Data Tier\n10.1.20.0/24"
              w: 580
              h: 160
              services:
                - id: adb-dr
                  label: "ADB-S Standby\nCross-Region ADG\n4 OCPU / 2 TB"
                  type: adb
                  w: 260
                  h: 65
                  fontSize: 9
                - id: adb-clone
                  label: "Refreshable Clone\n(Reporting)\n4 OCPU / 2 TB"
                  type: adb
                  w: 260
                  h: 65
                  fontSize: 9

            - id: sub-dr-app
              label: "Private Subnet — DR App Tier\n10.1.10.0/24"
              w: 580
              h: 100
              services:
                - id: dr-app
                  label: "App Servers (Dormant)\nProvisioned via Terraform on DR activation"
                  type: dormant
                  w: 320
                  h: 50
                - id: dr-lb
                  label: "LB (Dormant)\nDR Standby"
                  type: dormant
                  w: 160
                  h: 50

          gateways:
            - {id: drg-dr, label: "DRG\n(DR)", type: drg, w: 90}
            - {id: natgw-dr, label: "NAT\nGateway", type: natgw, w: 90}

      observability:
        - Monitoring
        - Logging
        - Events

# On-premises data center
onprem:
  label: "On-Premises Data Center"
  w: 750
  h: 120
  services:
    - id: src-db
      label: "Source Database\nOracle 19c EE\nExadata X8M\n2 RAC / 4 TB"
      type: exadata
      w: 200
      h: 80
    - id: src-app
      label: "Application Servers\nWebLogic 14c\n6x Bare Metal"
      type: vm
      w: 170
      h: 65
    - id: src-mq
      label: "MQ Series\nLegacy Queuing"
      type: legacy
      w: 140
      h: 55
    - id: src-dns
      label: "Corporate\nDNS / LDAP"
      type: legacy
      w: 120
      h: 55

# Connections
connections:
  # App flow
  - {from: lb, to: sub-app, type: standard, label: "HTTPS"}
  - {from: sub-app, to: sub-db, type: db, label: "SQL*Net + TAC"}

  # DR replication
  - {from: adb1, to: adb-dr, type: adg, label: "Autonomous\nData Guard — Async"}

  # Hybrid connectivity
  - {from: onprem, to: drg1, type: fastconnect, label: "FastConnect\n1 Gbps Redundant"}

  # Migration
  - id: mig
    from: src-db
    to: adb1
    type: migration
    label: "OCI DMS + ZDM"
    waypoints: [[350, 870], [950, 870]]

  # Streaming from on-prem
  - {from: src-mq, to: stream, type: etl, label: "OCI Streaming\nKafka Connect"}
