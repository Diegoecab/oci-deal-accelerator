# Example: E-Commerce Platform Workload Profile
# Generated from Discovery phase

workload_profile:
  business_context:
    customer_name: "Acme Retail Inc."
    industry: "retail"
    engagement_type: "migration"
    timeline: "Q3 2026"
    budget_range: "$30K-50K/month"
    competitive_situation: "aws_incumbent"
    oracle_relationship: "existing_licenses"

  compliance:
    regulatory_frameworks: ["PCI-DSS", "SOC2"]
    data_residency_required: false
    data_residency_regions: []
    sovereign_requirements: false
    audit_requirements: "annual SOC2 Type II audit"

  applications:
    - name: "E-Commerce Web Application"
      type: "web_app"
      current_platform: "aws"
      technology_stack: ["java", "spring_boot", "react", "oracle_db_19c"]
      criticality: "mission_critical"
      users: "10000 concurrent peak"
      data_volume: "2TB, growing 15%/year"

    - name: "Order Processing API"
      type: "api"
      current_platform: "aws"
      technology_stack: ["java", "spring_boot", "oracle_db_19c"]
      criticality: "mission_critical"
      users: "5000 TPS peak"
      data_volume: "shared with web app DB"

  performance:
    compute_iops: ""
    storage_iops: "20K IOPS sustained"
    network_throughput: "1 Gbps"
    latency_requirements: "< 100ms page load, < 10ms DB query"
    peak_patterns: "daily_peaks with seasonal Black Friday surge"

  resilience:
    rto: "1 hour"
    rpo: "5 minutes"
    availability_target: "99.95%"
    dr_required: true
    dr_type: "active_passive"
    backup_retention: "30 days, 1 year for compliance data"

  connectivity:
    type: "fastconnect"
    bandwidth: "1 Gbps"
    on_prem_integration: true
    multi_cloud_integration: false
    existing_network: "AWS Direct Connect to on-prem DC"

  operations:
    iac_experience: "advanced"
    cloud_experience: "advanced_aws"
    team_size: "5 cloud engineers"
    existing_tools: ["terraform", "jenkins", "datadog", "pagerduty"]
    managed_services_preference: "managed"

  decision_drivers:
    technical:
      - "Need Oracle Database compatibility (RAC features)"
      - "Lower DB licensing cost vs AWS RDS"
      - "Better price/performance for compute"
    commercial:
      - "Existing Oracle DB licenses (BYOL opportunity)"
      - "AWS contract ending Q2 2026"
    political:
      primary_audience: "cloud_architect"
      decision_maker: "VP Engineering"
      influencers: ["DBA Team Lead", "Security Director"]
      concerns: ["migration risk", "team retraining", "vendor lock-in"]

  # Derived flags
  flags:
    has_databases: true
    has_autonomous_database: true
    has_production_databases: true
    has_compute_instances: true
    has_production_compute: true
    has_block_volumes: true
    has_object_storage: true
    has_critical_data_in_object_storage: false
    has_critical_object_storage: false
    has_large_object_storage: false
    has_load_balancers: true
    has_internet_facing_services: true
    has_fastconnect: true
    has_drg: true
    has_variable_workloads: true
    has_critical_workloads: true
    has_critical_data: true
    has_application_workloads: true
    has_production_applications: true
    has_production_workloads: true
    has_auto_scaling: true
    has_oracle_licensed_services: true
    has_stable_production_workloads: true
    has_dev_test_environments: true
    has_multiple_environments: true
    has_sensitive_workloads: true
    multi_tenant: false
    multi_environment: true
    enterprise_customer: true
    hub_spoke_topology: true
    requires_dr: true
    multi_region: false
    hybrid_cloud: false
    multicloud: false
    has_data_residency_requirements: false
    has_sovereign_requirements: false
    distributed_cloud_applicable: false
