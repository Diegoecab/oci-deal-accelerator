# Example: Acme Corp Workload Profile
# Generated from discovery notes (see sample-discovery-notes.md)

workload_profile:
  engagement:
    customer_name: "Acme Corp"
    industry: "financial_services"
    decision_timeline: "6 months — target go-live September 2026"
    competitive_situation: "on_prem_only"

  current_state:
    databases:
      - name: "Main OLTP"
        engine: oracle
        version: "19c"
        size_gb: 4096
        type: OLTP
        tier: gold
        current_platform: on_prem
        ha_current: "RAC 2-node on Exadata X8M"
        replication: "Data Guard to DR site"
        connections_peak: 500
        cpu_metrics:
          avg_pct: 70
          p95_pct: 88
          vcpus: 32
        storage_metrics:
          iops_avg: 15000
          iops_peak: 45000
          throughput_mbps: 400
        notable_features:
          - partitioning
          - TDE
          - advanced_compression
          - APEX
          - DBMS_SCHEDULER
          - db_links
          - UTL_HTTP

      - name: "Reporting DB"
        engine: oracle
        version: "19c"
        size_gb: 2048
        type: OLAP
        tier: silver
        current_platform: on_prem
        ha_current: "none"
        replication: "GoldenGate from Main OLTP"
        connections_peak: 50
        cpu_metrics:
          avg_pct: 35
          p95_pct: 60
          vcpus: 16
        notable_features:
          - partitioning
          - advanced_compression

      - name: "APEX App DB"
        engine: oracle
        version: "19c"
        size_gb: 200
        type: mixed
        tier: bronze
        current_platform: on_prem
        ha_current: "none"
        replication: "none"
        connections_peak: 30
        cpu_metrics:
          avg_pct: 15
          p95_pct: 30
          vcpus: 4
        notable_features:
          - APEX

    compute:
      - name: "WebLogic App Servers"
        purpose: "Java enterprise applications"
        os: "Oracle Linux 7"
        vcpus: 48
        memory_gb: 192
        current_platform: on_prem
        scaling_pattern: daily_peaks

    middleware:
      - name: "WebLogic 14c Cluster"
        type: WebLogic
        clustering: "Active-Active 6 nodes on bare metal"

    messaging_and_eventing:
      - name: "IBM MQ Series"
        type: MQ_Series
        throughput_msgs_sec: 200
        pattern: point_to_point

    storage:
      - name: "Backup NFS"
        type: NFS
        size_tb: 10
        access_pattern: infrequent
      - name: "Application logs"
        type: NFS
        size_tb: 2
        access_pattern: frequent

    networking:
      connectivity: dedicated
      bandwidth_gbps: 1
      latency_requirement_ms: 5
      regions_needed: ["us-ashburn-1"]
      on_prem_integration: true

    identity_and_security:
      idp: AD
      compliance: ["PCI-DSS"]
      encryption_requirements: "TDE with customer-managed keys"
      vpd_rls: false
      data_masking: false
      audit_requirements: "PCI QSA quarterly, annual penetration testing"

    integration:
      - name: "MQ to DB bridge"
        type: ESB
        tool: "WebLogic JMS bridge"

  requirements:
    availability:
      rto_hours: 0.5
      rpo_hours: 0.0
      sla_target: "99.95%"
    performance:
      response_time_p95_ms: 100
      throughput_tps: 5000
      concurrent_users: 10000
    scalability:
      growth_annual_pct: 20
      peak_multiplier: 3.0
      scaling_speed: minutes
    migration:
      downtime_tolerance: "4 hours"
      migration_timeline: "6 months"
      parallel_run_needed: true

  decision_drivers:
    primary: hardware_eol
    budget_sensitivity: medium
    licensing: BYOL
    team_skills: ["oracle_dba", "weblogic", "linux"]
    political_constraints: "Board wants results fast. No Kubernetes experience on team."

  # Derived flags (auto-computed)
  flags:
    has_databases: true
    has_autonomous_database: true
    has_production_databases: true
    has_compute_instances: true
    has_production_workloads: true
    has_internet_facing_services: true
    has_fastconnect: true
    has_variable_workloads: true
    requires_dr: true
    enterprise_customer: true
    has_oracle_licensed_services: true
    distributed_cloud_applicable: false
