      monthly_payg: "$218,940"
      monthly_byol: "$65,904"
      notes: "BYOL saves $153K/year"
  assumptions:
    - "Pricing based on US East (Ashburn) region, March 2026 list prices"
    - "Auto-scaling costs estimated at 15% of base OCPU cost (seasonal peaks)"
    - "Data transfer costs excluded (minimal with FastConnect)"
    - "Oracle Support costs not included (existing contract assumed)"

migration:
  phases:
    - name: "Phase 1: Assessment"
      weeks: "Weeks 1-4"
      tasks: ["Run ADB assessment tool", "Inventory all DB objects", "Identify incompatibilities"]
    - name: "Phase 2: Infrastructure"
      weeks: "Weeks 3-6"
      tasks: ["Provision OCI tenancy", "Deploy landing zone", "Configure FastConnect"]
    - name: "Phase 3: Migration"
      weeks: "Weeks 5-10"
      tasks: ["ZDM for database migration", "Deploy OKE workloads", "Data validation"]
    - name: "Phase 4: Cutover"
      weeks: "Weeks 9-12"
      tasks: ["Final sync", "DNS cutover", "Post-migration validation", "Decommission on-prem"]
  tools: ["OCI Zero Downtime Migration (ZDM)", "OCI Database Migration Service", "Data Pump"]
  downtime: "Zero downtime via ZDM with GoldenGate-based replication"

risks:
  - risk: "Application compatibility with ADB-S restrictions"
    severity: "MEDIUM"
    mitigation: "Run ADB assessment tool pre-migration. Pilot with non-prod database first."
  - risk: "TAC replay failures for non-replayable operations"
    severity: "LOW"
    mitigation: "Audit application code for UTL_HTTP, DBMS_PIPE, NOCACHE sequences. Wrap in replayable transactions."
  - risk: "FastConnect provisioning lead time"
    severity: "MEDIUM"
    mitigation: "Order FastConnect in Phase 1. Use VPN as temporary connectivity until FC ready."
  - risk: "Team cloud skills gap"
    severity: "MEDIUM"
    mitigation: "Schedule OCI Foundations training. Engage Oracle Support for first 90 days."
  - risk: "Seasonal peak during migration window"
    severity: "HIGH"
    mitigation: "Complete migration before Black Friday. Maintain rollback capability for 30 days."

