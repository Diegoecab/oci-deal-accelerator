# Example: Slide Deck Spec — Acme Retail E-Commerce Migration
# Feed to: python tools/oci_slide_gen.py --spec examples/proposal-spec.yaml

metadata:
  customer: "Acme Retail Inc."
  project: "E-Commerce Platform Migration to OCI"
  architect: "Diego E."
  firm: "Oracle Consulting"
  subtitle: "Architecture Proposal — March 2026"

summary:
  why: "Reduce Oracle Database licensing costs by 60% and modernize to cloud-native architecture"
  current_state:
    - "3 Oracle 19c databases on Exadata X8M on-prem (largest 4 TB OLTP)"
    - "WebLogic 14c application servers (6x bare metal)"
    - "GoldenGate replication to reporting database"
    - "MQ Series for async messaging"
    - "Current Oracle licensing: $2M/year"
  target_state: "Migrate to OCI Autonomous Database (ADB-S) with OKE for application tier, full HA/DR"
  timeline: "6-month migration, Q3 2026 go-live"

architecture:
  description: |
    [Insert diagram — export from examples/ecommerce-architecture.drawio]

    Tenancy → Region (Ashburn) → VCN with 3 subnets:
    • Public: Flexible LB + WAF + Bastion
    • App Tier: OKE Cluster (3 workers, auto-scaling)
    • Data Tier: ADB-S OLTP (4 OCPU, BYOL) + ADB-S DW + NoSQL + Redis

    DR Region (Phoenix): ADB-S Standby via Autonomous Data Guard
    Connectivity: FastConnect 1 Gbps (redundant) + VPN backup

decisions:
  - decision: "ADB-S over ExaCS for primary database"
    rationale: "Variable workload pattern, no dedicated DBA team, auto-scaling covers seasonal peaks. ExaCS oversized for this workload."

  - decision: "OKE over VM-based app tier"
    rationale: "Team moving to containers. OKE provides auto-scaling per microservice, free control plane, blue/green deployments."

  - decision: "Cross-region ADG for DR"
    rationale: "PCI compliance requires geo-redundant disaster recovery. ADG provides seconds RPO, minutes RTO."

  - decision: "FastConnect over VPN for hybrid connectivity"
    rationale: "Low-latency requirement during migration coexistence. VPN as backup path only."

  - decision: "BYOL licensing for ADB-S"
    rationale: "Customer has 8 existing processor licenses. BYOL saves ~75% on OCPU cost vs License Included."

  - decision: "OCI Streaming over dedicated MQ migration"
    rationale: "Kafka-compatible API allows gradual migration from MQ Series. No new middleware licensing."

ha_dr:
  description: "Active-passive DR with Autonomous Data Guard. Application tier provisioned on-demand in DR region via Terraform."
  tiers:
    - tier: "Database (Primary)"
      technology: "ADB-S + TAC (Transparent Application Continuity)"
      rto: "~0 perceived"
      rpo: "0 (local)"
    - tier: "Database (DR)"
      technology: "Cross-Region Autonomous Data Guard (async)"
      rto: "< 15 minutes"
      rpo: "< 30 seconds"
    - tier: "Application"
      technology: "OKE Auto-scaling + Health Checks"
      rto: "Seconds"
      rpo: "N/A (stateless)"
    - tier: "Application (DR)"
      technology: "Terraform on-demand provisioning"
      rto: "15-30 minutes"
      rpo: "N/A (stateless)"

security:
  compliance: ["PCI-DSS", "SOC2"]
  controls:
    identity:
      - "IAM least-privilege per compartment"
      - "MFA for all human users"
      - "Federation with Okta (SAML)"
      - "Instance principals for service auth"
    network:
      - "Private subnets for app and data tiers"
      - "NSGs (not security lists)"
      - "WAF on all internet-facing endpoints"
      - "Service Gateway (no internet traversal to OCI)"
    database:
      - "TDE with customer-managed keys (Vault)"
      - "Data Safe (audit, masking, VPD)"
      - "Private endpoints only"
      - "Key rotation < 90 days"
    monitoring:
      - "Cloud Guard with detector recipes"
      - "OCI Audit (365-day retention)"
      - "VCN Flow Logs"
      - "Vulnerability Scanning on OKE nodes"

