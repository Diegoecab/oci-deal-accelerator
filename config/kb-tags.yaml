# =============================================================================
# KB TAG TAXONOMY
# =============================================================================
#
# Standardized tags for consistent search and categorization across all KB files.
# The CLI validates tags against this taxonomy and suggests corrections for
# unknown tags using fuzzy matching.
#
# Referenced by: tools/findings_cli.py, tools/kb_linter.py
# =============================================================================

---
taxonomy:
  products:
    - adb       # generic ADB (covers both -s and -d)
    - adb-s
    - adb-d
    - dep
    - exacs
    - dbcs
    - oke
    - functions
    - vcn
    - drg
    - fastconnect
    - dms
    - goldengate
    - data-safe
    - vault
    - rac
    - proxysql

  versions:
    - 19c
    - 21c
    - 23ai
    - 26ai

  categories:
    - ha
    - dr
    - security
    - networking
    - performance
    - migration
    - cost
    - sizing
    - compliance

  features:
    - adg                  # Active Data Guard
    - ai-vector-search
    - vector-search
    - hnsw                 # Hierarchical Navigable Small World indexes
    - json
    - partitioning
    - refreshable-clone
    - elastic-pool
    - ecpu                 # ECPU billing model (vs OCPU)
    - connection-pooling
    - distributed
    - immutable
    - serialization

  operations:
    - cli
    - maintenance-window
    - provisioning
    - planning
    - lead-time
    - capacity
    - node-split
    - zero-downtime
    - bidirectional
    - detection-delay
    - stale-reads

  metrics:
    - latency
    - 100m                 # 100 million scale (e.g. vector counts)

  limitations:
    - limitation
    - sr-required          # Service Request required to enable / fix

  severity_tags:
    - blocker
    - workaround-available
    - cosmetic

  lifecycle:
    - design
    - migration
    - day2
    - decommission
