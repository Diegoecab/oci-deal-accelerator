# OCI Database Service Pricing — For Estimation Only
# last_verified: 2026-03-14

disclaimer: |
  Approximate pricing for estimation (within ~15%). Actual pricing varies by
  region, commitment level, and negotiated discounts. Always verify against
  https://www.oracle.com/cloud/pricing/

# OCI Database Service Pricing — For Estimation Only

autonomous_database_serverless:
  license_included:
    ocpu_per_hour: 1.3441
    storage_tb_per_month: 118.40
  byol:
    ocpu_per_hour: 0.3360
    storage_tb_per_month: 118.40
  auto_scaling:
    notes: "Billed per OCPU-second for additional OCPUs above base. Same rate as base."
  adg_standby:
    notes: "Standby OCPU cost at same rate as primary. Storage shared (no extra)."
  backup:
    notes: "Automated backups included in storage cost. Manual backups use Object Storage rates."
  examples:
    8_ocpu_2tb_payg:
      monthly_li: "$7,850"
      monthly_byol: "$2,200"
      breakdown: "8 OCPU × $1.3441/hr × 730hr + 2TB × $118.40"
    8_ocpu_2tb_byol_with_adg:
      monthly: "$4,400"
      breakdown: "2 × (8 OCPU × $0.3360/hr × 730hr) + 2TB × $118.40"

autonomous_database_dedicated:
  infrastructure:
    quarter_rack:
      base_per_hour: "~$10.50"
      monthly_estimate: "$7,500–$8,000"
      included: "2 DB servers, 3 storage servers, 100TB usable"
    half_rack:
      base_per_hour: "~$21.00"
      monthly_estimate: "$15,000–$16,000"
      included: "4 DB servers, 6 storage servers, 200TB usable"
    full_rack:
      base_per_hour: "~$42.00"
      monthly_estimate: "$30,000–$32,000"
      included: "8 DB servers, 12 storage servers, 400TB usable"
  ocpu_pricing:
    license_included_per_hour: 1.3441
    byol_per_hour: 0.3360
    notes: "OCPUs provisioned on top of infrastructure. Minimum varies by rack size."
  notes: |
    Infrastructure cost is fixed (rack size). OCPU cost is on top.
    DEP (Database Enterprise Patching) co-location is at next maintenance window.
    Billing starts only at AVAILABLE state.
    Provisioning takes days to weeks depending on capacity.

dbcs:
  vm_standard:
    license_included:
      ocpu_per_hour_se: 0.2277
      ocpu_per_hour_ee: 0.4554
      ocpu_per_hour_ee_hp: 0.5693
      ocpu_per_hour_ee_ep: 0.6831
    byol:
      ocpu_per_hour: 0.1139
    storage_per_gb_month: 0.0255
    notes: |
      SE = Standard Edition, EE = Enterprise Edition,
      HP = High Performance (includes partitioning, advanced compression, etc.),
      EP = Extreme Performance (includes RAC, Active Data Guard, In-Memory).
      Backup storage charged separately at Object Storage rates.
  bm_standard:
    notes: "Bare metal pricing similar per-OCPU but fixed shape. Contact Oracle for quotes."
  examples:
    4_ocpu_ee_hp_500gb:
      monthly_li: "$3,350"
      breakdown: "4 OCPU × $0.5693/hr × 730hr + 500GB × $0.0255 + backup"

exacs:
  infrastructure:
    quarter_rack_x9m:
      per_hour: "~$24.00"
      monthly_estimate: "$17,500–$18,500"
      included: "2 DB servers, 3 storage servers, 50TB usable raw"
      ocpu_max: 100
    half_rack_x9m:
      per_hour: "~$48.00"
      monthly_estimate: "$35,000–$37,000"
      included: "4 DB servers, 6 storage servers, 100TB usable raw"
      ocpu_max: 200
    full_rack_x9m:
      per_hour: "~$96.00"
      monthly_estimate: "$70,000–$74,000"
      included: "8 DB servers, 12 storage servers, 200TB usable raw"
      ocpu_max: 400
  ocpu_pricing:
    license_included_per_hour: 0.6831
    byol_per_hour: 0.1139
    notes: "OCPUs enabled on top of infrastructure cost."
  what_is_included:
    - "Exadata smart storage (flash cache, storage indexes)"
    - "Automated patching (GI + DB separate schedules)"
    - "Automated backups to Object Storage"
    - "RAC licensing included in Extreme Performance edition"
  what_is_extra:
    - "Data Guard setup and standby infrastructure"
    - "Additional storage beyond rack capacity"
    - "Object Storage for long-term backup retention"
  gotchas:
    - "Minimum commitment is quarter rack (~$17K/month). No smaller option."
    - "Infrastructure cost is fixed regardless of OCPU utilization."
    - "Provisioning takes 4-8 hours (faster than ADB-D but still significant)."
    - "X8M vs X9M: X9M has better storage density and newer CPUs."
  examples:
    quarter_rack_100_ocpu_byol:
      monthly: "$26,000"
      breakdown: "$17,500 infra + 100 OCPU × $0.1139/hr × 730hr"

reserved_discounts:
  one_year: "~35-40% vs PAYG"
  three_year: "~55-65% vs PAYG"
  notes: "Available for all database services. Commitment is per-region."

estimation_helpers:
  monthly_hours: 730
  byol_savings: "50-75% on OCPU cost for Oracle Database products"
  adb_s_sweet_spot: "4-32 OCPUs with auto-scaling. Below 4, consider Always Free. Above 128, consider ADB-D or ExaCS."
  cost_comparison_tip: |
    When comparing with AWS RDS or Azure SQL MI, include:
    - OCI inbound data transfer is free
    - OCI outbound is ~80% cheaper than AWS
    - OCI BYOL discount is deeper than AWS BYOL
    - ADB-S includes patching, tuning, indexing — RDS does not
