break_even_analysis:
  adb_s_vs_adb_d: >
    ADB-D breaks even vs multiple ADB-S instances at approximately
    64-96 sustained OCPU total across all databases on the infrastructure.
    Below this, ADB-S is cheaper. Above this, ADB-D amortizes infra cost.
  adb_s_vs_dbcs: >
    ADB-S is typically 20-40% more expensive per OCPU than DBCS,
    but eliminates DBA operational cost. Factor in $150-250K/year
    per DBA when comparing total cost of ownership.
  dbcs_vs_exacs: >
    ExaCS breaks even vs multiple DBCS instances at approximately
    32+ sustained OCPU with Exadata performance requirements.
