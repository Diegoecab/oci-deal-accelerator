---
last_verified: 2026-03-14
description: OCI Draw.io Toolkit v24.2 visual style definitions
source: "https://docs.oracle.com/en-us/iaas/Content/General/Reference/graphicsfordiagrams.htm"
---

# Color Palette — Official OCI Design System
colors:
  # Primary Oracle colors
  oracle_red: "#C74634"
  oracle_black: "#312D2A"

  # Container colors
  region_fill: "#F5F4F2"
  region_stroke: "#B8B5B2"
  tenancy_fill: "#FFFFFF"
  tenancy_stroke: "#312D2A"
  vcn_fill: "none"
  vcn_stroke: "#AE562C"
  subnet_fill: "none"
  subnet_stroke: "#AE562C"
  compartment_fill: "#F5F4F2"
  compartment_stroke: "#B8B5B2"
  availability_domain_fill: "#EEEDEB"
  availability_domain_stroke: "#B8B5B2"
  fault_domain_fill: "#E5E3E0"
  fault_domain_stroke: "#B8B5B2"

  # Service category colors
  database: "#AA643B"       # copper/bronze
  compute: "#647A4F"        # teal/green
  networking: "#3B7393"     # blue
  storage: "#5A5A5A"        # gray
  security: "#8B4F8B"       # purple
  integration: "#564B9E"    # deep purple
  management: "#3B7393"     # blue
  ai_ml: "#C74634"          # oracle red

  # Text
  text_primary: "#312D2A"   # charcoal — never pure black
  text_secondary: "#6B6560"
  text_on_dark: "#FFFFFF"

# Container Styles
containers:
  tenancy:
    style: "rounded=1;whiteSpace=wrap;fillColor=#FFFFFF;strokeColor=#312D2A;strokeWidth=2;dashed=0;arcSize=8;"
    label_style: "fontFamily=Oracle Sans;fontSize=14;fontColor=#312D2A;fontStyle=1;"

  region:
    style: "rounded=1;whiteSpace=wrap;fillColor=#F5F4F2;strokeColor=#B8B5B2;strokeWidth=1;dashed=0;arcSize=8;"
    label_style: "fontFamily=Oracle Sans;fontSize=12;fontColor=#312D2A;fontStyle=1;"
    label_position: "top-left"

  vcn:
    style: "rounded=0;whiteSpace=wrap;fillColor=none;strokeColor=#AE562C;strokeWidth=2;dashed=1;dashPattern=8 4;"
    label_style: "fontFamily=Oracle Sans;fontSize=11;fontColor=#AE562C;fontStyle=1;"

  subnet:
    style: "rounded=0;whiteSpace=wrap;fillColor=none;strokeColor=#AE562C;strokeWidth=1;dashed=1;dashPattern=4 4;"
    label_style: "fontFamily=Oracle Sans;fontSize=10;fontColor=#AE562C;fontStyle=0;"

  availability_domain:
    style: "rounded=1;whiteSpace=wrap;fillColor=#EEEDEB;strokeColor=#B8B5B2;strokeWidth=1;dashed=0;arcSize=4;"
    label_style: "fontFamily=Oracle Sans;fontSize=10;fontColor=#6B6560;"

  fault_domain:
    style: "rounded=1;whiteSpace=wrap;fillColor=#E5E3E0;strokeColor=#B8B5B2;strokeWidth=1;dashed=1;arcSize=4;"
    label_style: "fontFamily=Oracle Sans;fontSize=9;fontColor=#6B6560;"

# Service Block Styles
service_blocks:
  default:
    width: 160
    height: 60
    style: "rounded=1;whiteSpace=wrap;strokeWidth=1;arcSize=12;"
    label_style: "fontFamily=Oracle Sans;fontSize=10;fontColor=#312D2A;"

  database:
    fill: "#AA643B"
    stroke: "#8A5030"
    text: "#FFFFFF"

  compute:
    fill: "#647A4F"
    stroke: "#4D6139"
    text: "#FFFFFF"

  networking:
    fill: "#3B7393"
    stroke: "#2D5A73"
    text: "#FFFFFF"

  storage:
    fill: "#5A5A5A"
    stroke: "#404040"
    text: "#FFFFFF"

  security:
    fill: "#8B4F8B"
    stroke: "#6B3D6B"
    text: "#FFFFFF"

  integration:
    fill: "#564B9E"
    stroke: "#413A7A"
    text: "#FFFFFF"

# Connection Styles
connections:
  default:
    style: "endArrow=block;endFill=1;strokeColor=#312D2A;strokeWidth=1;"

  data_guard:
    style: "endArrow=block;endFill=1;strokeColor=#AA643B;strokeWidth=2;dashed=1;dashPattern=8 4;"
    label: "Data Guard"

  fastconnect:
    style: "endArrow=block;endFill=1;strokeColor=#3B7393;strokeWidth=2;dashed=0;"
    label: "FastConnect"

  vpn:
    style: "endArrow=block;endFill=1;strokeColor=#3B7393;strokeWidth=1;dashed=1;dashPattern=4 4;"
    label: "IPSec VPN"

  data_flow:
    style: "endArrow=open;endFill=0;strokeColor=#6B6560;strokeWidth=1;dashed=0;"

# Layout Guidelines
layout:
  page_size: "A3 landscape (420x297mm)"
  margin: 20
  container_padding: 15
  service_spacing: 20
  font: "Oracle Sans"
  min_font_size: 9
  max_font_size: 16
